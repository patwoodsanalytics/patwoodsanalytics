<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Papa Sayings Bingo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Papa Sayings Bingo</h1>
    <p class="subtitle">Tap squares as Papa says them. Edit the phrases anytime.</p>

    <div class="controls">
      <button id="newCard" type="button">New Card</button>
      <button id="editPhrases" type="button">Edit Card Phrases</button>
      <button id="clearMarks" type="button">Clear Marks</button>
    </div>

    <p id="status" class="status" aria-live="polite"></p>

    <div id="bingo-board" class="board"></div>

    <div id="editorPanel" class="editor hidden">
      <div class="editor-card">
        <div class="editor-header">
          <h2>Edit Bingo Phrases</h2>
          <button id="closeEditor" class="secondary" type="button">Close</button>
        </div>
        <p class="editor-help">Enter one phrase per line. Use at least 24 phrases.</p>
        <textarea id="phrasesInput" spellcheck="true"></textarea>
        <div class="editor-actions">
          <button id="savePhrases" type="button">Save Phrases</button>
          <button id="resetDefaults" class="secondary" type="button">Reset Defaults</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
